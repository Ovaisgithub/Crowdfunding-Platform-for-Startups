# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/crowdfunding_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.crowdfunding=DEBUG

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_S6yryIHXivHYHm}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:yqLVLOFm5sSwtWwe82wi3NYU}
